    <radialGradient id="glow1" cx="0.8" cy="0.15" r="0.75"><stop offset="0" stop-color="#1a56db" stop-opacity="0.4"/><stop offset="1" stop-color="#1a56db" stop-opacity="0"/></radialGradient>
    <radialGradient id="glow2" cx="0.15" cy="0.85" r="0.55"><stop offset="0" stop-color="#0e9f6e" stop-opacity="0.28"/><stop offset="1" stop-color="#0e9f6e" stop-opacity="0"/></radialGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1a56db"/><stop offset="1" stop-color="#0e9f6e"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
