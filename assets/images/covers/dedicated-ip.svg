    <line x1="0" y1="-28" x2="0" y2="-130" stroke="#1a56db" stroke-width="1.5" stroke-dasharray="5,4" stroke-opacity="0.6"/>
    <line x1="28" y1="14" x2="113" y2="65" stroke="#0e9f6e" stroke-width="1.5" stroke-dasharray="5,4" stroke-opacity="0.6"/>
